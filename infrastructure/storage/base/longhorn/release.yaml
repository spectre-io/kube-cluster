apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
  namespace: longhorn-system
spec:
  interval: 30m
  chart:
    spec:
      chart: longhorn
      version: "1.7.x"
      sourceRef:
        kind: HelmRepository
        name: longhorn
        namespace: longhorn-system
  install:
    crds: Create
  upgrade:
    crds: CreateReplace
  driftDetection:
    mode: enabled
  values:
    defaultSettings:
      defaultReplicaCount: 2                  # Perfect for 2 nodes
      createDefaultDiskLabeledNodes: true
      storageOverProvisioningPercentage: 100
      backupTarget: ""                        # add S3 later if you want
    persistence:
      defaultClassReplicaCount: 2
    nodeSelector:
      kubernetes.io/role: storage             # optional: label your 2 nodes
    tolerations:
      - operator: Exists
