apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: linkding
  namespace: linkding
spec:
  instances: 2
  storage:
    storageClass: longhorn
    size: 1Gi
  postgresql:
    parameters:
      max_connections: "100"
  bootstrap:
    initdb:
      database: linkding
      owner: linkding
