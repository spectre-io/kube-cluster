apiVersion: apps/v1
kind: Deployment
metadata:
  name: linkding
spec:
  replicas: 1
  selector:
    matchLabels:
      app: linkding
  template:
    metadata:
      labels:
        app: linkding
    spec:
      containers:
        - image: sissbruecker/linkding:1.45.0
          name: linkding
          ports:
            - containerPort: 9090

          envFrom:
            - secretRef:
                name: linkding-container-env

          env:
            - name: LD_DB_ENGINE
              value: postgres
            - name: LD_DB_HOST
              valueFrom:
                secretKeyRef:
                  name: linkding-app
                  key: host
            - name: LD_DB_PORT
              valueFrom:
                secretKeyRef:
                  name: linkding-app
                  key: port
            - name: LD_DB_NAME
              valueFrom:
                secretKeyRef:
                  name: linkding-app
                  key: dbname
            - name: LD_DB_USER
              valueFrom:
                secretKeyRef:
                  name: linkding-app
                  key: username
            - name: LD_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: linkding-app
                  key: password

          #securityContext:
           # fsGroup: 33
            #runAsUser: 33
            #runAsGroup: 33
            #allowPrivilegeEscalation: false

          volumeMounts:
            - mountPath: /etc/linkding/data
              name: linkding-data

      restartPolicy: Always

      volumes:
        - name: linkding-data
          persistentVolumeClaim:
            claimName: linkding-data-pvc
