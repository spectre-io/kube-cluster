apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
  name: mealie
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mealie
  template:
    metadata:
      labels:
        app: mealie
    spec:
      containers:
      - image: hkotel/mealie:3.14.0
        name: mealie
        ports:
          - containerPort: 9000

    volumeMounts:
      - mountPath: /etc/mealie/data
        name: mealie-data

    restartPolicy: Always

    volumes:
      - name: mealie-data
        persistentVolumeClaim:
          claimName: mealie-data-pvc
